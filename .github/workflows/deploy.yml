name: Deploy to WordPress.org

on:
  push:
    tags:
      - '*.*.*'

concurrency:
  group: deploy-wordpress-org-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plugin-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF_NAME}"
          VERSION="$TAG_NAME"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected a semantic version tag such as 1.4.4, got: $VERSION" >&2
            exit 1
          fi

          PLUGIN_VERSION="$(sed -n 's/^Version:[[:space:]]*//p' slug-free-permalinks.php | head -n1 | tr -d '\r')"
          STABLE_TAG="$(sed -n 's/^Stable tag:[[:space:]]*//Ip' readme.txt | head -n1 | tr -d '\r')"

          if [[ -z "$PLUGIN_VERSION" ]]; then
            echo "Could not read Version from slug-free-permalinks.php" >&2
            exit 1
          fi

          if [[ -z "$STABLE_TAG" ]]; then
            echo "Could not read Stable tag from readme.txt" >&2
            exit 1
          fi

          if [[ "$PLUGIN_VERSION" != "$VERSION" ]]; then
            echo "Plugin Version ($PLUGIN_VERSION) does not match tag version ($VERSION)." >&2
            exit 1
          fi

          if [[ "$STABLE_TAG" != "$VERSION" ]]; then
            echo "Stable tag ($STABLE_TAG) does not match tag version ($VERSION)." >&2
            exit 1
          fi

          echo "WPORG_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build distributable
        run: node scripts/build-dist.mjs

      - name: Verify distributable
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/slug-free-permalinks/slug-free-permalinks.php
          test -f dist/slug-free-permalinks/readme.txt

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: dist/slug-free-permalinks

  deploy:
    runs-on: ubuntu-latest
    needs: plugin-check
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF_NAME}"
          VERSION="$TAG_NAME"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected a semantic version tag such as 1.4.4, got: $VERSION" >&2
            exit 1
          fi

          PLUGIN_VERSION="$(sed -n 's/^Version:[[:space:]]*//p' slug-free-permalinks.php | head -n1 | tr -d '\r')"
          STABLE_TAG="$(sed -n 's/^Stable tag:[[:space:]]*//Ip' readme.txt | head -n1 | tr -d '\r')"

          if [[ -z "$PLUGIN_VERSION" ]]; then
            echo "Could not read Version from slug-free-permalinks.php" >&2
            exit 1
          fi

          if [[ -z "$STABLE_TAG" ]]; then
            echo "Could not read Stable tag from readme.txt" >&2
            exit 1
          fi

          if [[ "$PLUGIN_VERSION" != "$VERSION" ]]; then
            echo "Plugin Version ($PLUGIN_VERSION) does not match tag version ($VERSION)." >&2
            exit 1
          fi

          if [[ "$STABLE_TAG" != "$VERSION" ]]; then
            echo "Stable tag ($STABLE_TAG) does not match tag version ($VERSION)." >&2
            exit 1
          fi

          echo "WPORG_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build distributable
        run: node scripts/build-dist.mjs

      - name: Verify distributable
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/slug-free-permalinks/slug-free-permalinks.php
          test -f dist/slug-free-permalinks/readme.txt

      - name: Deploy to WordPress.org
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SLUG: slug-free-permalinks
          VERSION: ${{ env.WPORG_VERSION }}
          BUILD_DIR: dist/slug-free-permalinks
          ASSETS_DIR: .wordpress-org
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
